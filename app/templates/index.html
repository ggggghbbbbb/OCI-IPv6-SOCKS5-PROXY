<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OCI IPv6 SOCKS5 代理池</title><style>body{font-family:Arial,"Microsoft YaHei",sans-serif;background:#0f172a;color:#e5e7eb;margin:0}.wrap{max-width:1280px;margin:0 auto;padding:24px}.card{background:#111827;border:1px solid #334155;border-radius:14px;padding:18px;margin-bottom:16px}.vnic-card{background:#0b1220;border:1px solid #334155;border-radius:14px;margin:14px 0;overflow:hidden}.vnic-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;background:#172033;cursor:pointer}.vnic-body{padding:14px 16px}.collapsed .vnic-body{display:none}button,input,textarea{border-radius:8px;border:1px solid #475569;padding:9px 12px;background:#1e293b;color:#fff}textarea{width:100%;min-height:90px;box-sizing:border-box}button{cursor:pointer;background:#2563eb;border:0}button:disabled{opacity:.45;cursor:not-allowed}button.danger{background:#dc2626}button.gray{background:#475569}button.good{background:#16a34a}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.muted{color:#94a3b8}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.proxy{display:grid;grid-template-columns:88px 1fr 82px 86px 74px;gap:8px;align-items:center;border-top:1px solid #334155;padding:10px 0}.uri{font-family:monospace;background:#020617;padding:8px;border-radius:8px;overflow:auto}.ok{color:#22c55e}.bad{color:#f87171}.tabs button{background:#334155}.hidden{display:none}.pill{font-size:12px;border:1px solid #475569;border-radius:999px;padding:3px 8px;background:#020617}.title{font-weight:700}.small{font-size:12px}@media(max-width:900px){.proxy{grid-template-columns:1fr}.wrap{padding:12px}.vnic-head{align-items:flex-start;flex-direction:column}}</style></head><body><div class="wrap"><h1>OCI IPv6 SOCKS5 代理池</h1><div class="card"><div class="grid"><div>代理数量：<b id="count">-</b>/<span id="max">-</span></div><div>VNIC：<b id="vnicCount">-</b></div><div>代理服务：<b id="svc">-</b></div><div>强制 IPv6：<b id="forceState">-</b></div><div>格式：<code>socks5://用户:密码@主机:端口</code></div></div></div><div class="card tabs"><div class="row"><button onclick="showTab('proxies')">代理</button><button onclick="showTab('settings')">设置/账号密码</button><button onclick="showTab('oci')">Oracle API</button><button onclick="showTab('vnics')">VNIC 管理</button></div><p class="muted" id="msg"></p></div><div id="tab-proxies" class="card"><div class="row"><button class="gray" onclick="toggleForceIpv6()">切换强制IPv6</button><button class="gray" onclick="copyAll()">复制全部</button><button class="gray" onclick="location.href='/api/export'">打开导出</button><button class="gray" onclick="expandAll(true)">全部展开</button><button class="gray" onclick="expandAll(false)">全部折叠</button><button class="gray" onclick="load()">刷新</button></div><h2>按 VNIC 分组的代理列表</h2><div id="groupList"></div></div><div id="tab-vnics" class="card hidden"><h2>VNIC 管理</h2><p class="muted">默认主 VNIC 带 IPv4，禁止删除。Secondary VNIC 删除前必须先清空其下代理。当前项目按实例支持的最大 VNIC 数动态显示，不写死 4 个。</p><div class="row"><button class="good" onclick="addVnic()">添加 secondary VNIC</button><button class="gray" onclick="load()">刷新</button></div><div id="vnicList"></div></div><div id="tab-settings" class="card hidden"><h2>设置 / 修改登录和代理账号密码</h2><div class="grid"><label>面板用户名<input id="panel_user"></label><label>面板新密码<input id="panel_pass" type="password" placeholder="留空则不改"></label><label>代理用户名<input id="proxy_user"></label><label>代理新密码<input id="proxy_pass" type="password" placeholder="留空则不改"></label><label>公网主机<input id="public_host"></label></div><p><label><input type="checkbox" id="apply_creds"> 同步更新已有代理的用户名密码</label></p><button class="good" onclick="saveSettings()">保存设置</button><p class="muted">修改面板账号密码后，浏览器可能需要重新登录。</p></div><div id="tab-oci" class="card hidden"><h2>Oracle API 配置</h2><div class="grid"><label>user OCID<input id="oci_user"></label><label>fingerprint<input id="oci_fingerprint"></label><label>tenancy OCID<input id="oci_tenancy"></label><label>region<input id="oci_region" placeholder="us-phoenix-1"></label><label>VNIC ID<input id="oci_vnic"></label><label>Subnet ID<input id="oci_subnet"></label></div><p>private key PEM：</p><textarea id="oci_key" placeholder="-----BEGIN PRIVATE KEY-----..."></textarea><button class="good" onclick="saveOci()">保存并验证 OCI API</button></div></div><script>let proxies=[];let vnics=[];let forceIpv6=false;let config={};let collapsed=JSON.parse(localStorage.getItem('vnicCollapsed')||'{}');function msg(t){document.getElementById('msg').textContent=t}function showTab(n){for(let x of ['proxies','settings','oci','vnics'])document.getElementById('tab-'+x).classList.toggle('hidden',x!==n)}async function api(u,o){let r=await fetch(u,Object.assign({headers:{'Content-Type':'application/json'}},o||{}));let tx=await r.text();try{return JSON.parse(tx)}catch(e){return {ok:false,error:tx,status:r.status}}}function saveCollapsed(){localStorage.setItem('vnicCollapsed',JSON.stringify(collapsed))}function toggleVnic(id){collapsed[id]=!collapsed[id];saveCollapsed();renderGroups()}function expandAll(open){for(let v of vnics)collapsed[v.vnic_id]=!open;saveCollapsed();renderGroups()}function proxyRow(p){return `<div class="proxy"><div>#${p.port}</div><div class="uri" id="u-${p.id}">${p.uri}</div><button onclick="copyText('${p.id}')">复制</button><button class="good" ${p.can_rotate?'':'disabled'} onclick="rotateProxy('${p.id}')">切换IPv6</button><button class="danger" onclick="delProxy('${p.id}')">删除</button><div class="muted small">出口IPv6</div><div class="uri">${p.ip}</div><div class="muted small">${p.protected?'主IPv6':(p.rotated?'切换 '+p.rotated:'')}</div><div></div><div></div></div>`}function renderGroups(){let by={};for(let p of proxies){(by[p.vnic_id||'unknown']=by[p.vnic_id||'unknown']||[]).push(p)}let h='';for(let v of vnics){let arr=(by[v.vnic_id]||[]).sort((a,b)=>a.port-b.port);let isCol=!!collapsed[v.vnic_id];let cap=32-(v.count||arr.length);h+=`<div class="vnic-card ${isCol?'collapsed':''}"><div class="vnic-head" onclick="toggleVnic('${v.vnic_id}')"><div><span class="title">${v.iface||''}</span> <span class="pill">${v.is_primary?'主VNIC 禁删':'Secondary'}</span> <span class="pill">${arr.length}/32</span><div class="muted small">${v.display_name||''} | ${v.vnic_id} | private ${v.private_ip||''}</div></div><div>${isCol?'展开':'折叠'}</div></div><div class="vnic-body"><div class="row"><input id="add-${v.vnic_id}" type="number" min="1" max="32" value="1"><button class="good" ${cap<=0?'disabled':''} onclick="addToVnic(event,'${v.vnic_id}')">添加到此 VNIC</button><button class="gray" onclick="copyVnic(event,'${v.vnic_id}')">复制本组</button><button class="gray" onclick="event.stopPropagation();toggleVnic('${v.vnic_id}')">折叠/展开</button><span class="muted">剩余容量：${cap}</span></div><div>${arr.map(proxyRow).join('')||'<p class="muted">此 VNIC 暂无代理。</p>'}</div></div></div>`}document.getElementById('groupList').innerHTML=h||'<p class="muted">暂无 VNIC。</p>';let vh='';for(let v of vnics){vh+=`<div class="proxy"><div>${v.iface||''}</div><div class="uri">${v.display_name||''}<br>${v.vnic_id}<br>private: ${v.private_ip||''} / MAC: ${v.mac||''}</div><div>${v.count||0}/32</div><div>${v.is_primary?'主VNIC 禁删':'Secondary'}</div><button class="danger" ${v.is_primary?'disabled':''} onclick="delVnic('${v.vnic_id}')">删除VNIC</button></div>`}document.getElementById('vnicList').innerHTML=vh||'<p class="muted">暂无 VNIC 信息。</p>'}async function load(){let d=await api('/api/status');config=d.config||{};proxies=d.proxies||[];vnics=d.vnics||[];forceIpv6=!!config.force_ipv6;document.getElementById('count').textContent=d.count;document.getElementById('max').textContent=d.max;document.getElementById('vnicCount').textContent=vnics.length;document.getElementById('svc').textContent=d.proxy_service;document.getElementById('svc').className=d.proxy_service==='active'?'ok':'bad';document.getElementById('forceState').textContent=forceIpv6?'开启：只走IPv6，IPv4-only目标失败':'关闭：IPv6优先，IPv4-only回退';document.getElementById('forceState').className=forceIpv6?'ok':'muted';for(let k of ['panel_user','proxy_user','public_host']) if(document.getElementById(k)) document.getElementById(k).value=config[k]||'';document.getElementById('oci_vnic').value=config.vnic_id||'';document.getElementById('oci_subnet').value=config.subnet_id||'';renderGroups()}async function addToVnic(ev,id){ev.stopPropagation();let n=parseInt(document.getElementById('add-'+id).value||'1');msg('正在添加到指定 VNIC...');let d=await api('/api/add',{method:'POST',body:JSON.stringify({count:n,vnic_id:id})});msg(d.ok?`添加完成：${(d.added||[]).length} 个 ${(d.errors||[]).join('; ')}`:`失败：${d.error}`);await load()}async function rotateProxy(id){if(!confirm('切换这个端口的 IPv6？端口和代理链接不变。'))return;msg('正在切换 IPv6...');let d=await api('/api/rotate',{method:'POST',body:JSON.stringify({id})});msg(d.ok?`已切换：${d.old.ip} -> ${d.new.ip}`:`切换失败：${d.error}`);await load()}async function delProxy(id){if(!confirm('删除这个代理并释放 IPv6？'))return;let d=await api('/api/delete',{method:'POST',body:JSON.stringify({id})});msg(d.ok?'已删除':'删除失败：'+d.error);await load()}async function copyText(id){let t=document.getElementById('u-'+id).textContent;await navigator.clipboard.writeText(t);msg('已复制：'+t)}async function copyAll(){let t=proxies.map(p=>p.uri).join('\n');await navigator.clipboard.writeText(t);msg('已复制全部 '+proxies.length+' 条')}async function copyVnic(ev,id){ev.stopPropagation();let t=proxies.filter(p=>p.vnic_id===id).sort((a,b)=>a.port-b.port).map(p=>p.uri).join('\n');await navigator.clipboard.writeText(t);msg('已复制本组 '+(t?t.split('\n').length:0)+' 条')}async function toggleForceIpv6(){let d=await api('/api/config',{method:'POST',body:JSON.stringify({force_ipv6:!forceIpv6})});msg(d.ok?'强制IPv6已'+(!forceIpv6?'开启':'关闭'):'切换失败');await load()}async function addVnic(){if(!confirm('添加一个 secondary VNIC？'))return;msg('正在添加 VNIC...');let d=await api('/api/vnics/add',{method:'POST',body:'{}'});msg(d.ok?'VNIC 已添加，请继续添加代理':'添加失败：'+d.error);await load()}async function delVnic(id){if(!confirm('删除这个 secondary VNIC？必须确保下面没有代理。'))return;let d=await api('/api/vnics/delete',{method:'POST',body:JSON.stringify({vnic_id:id})});msg(d.ok?'VNIC 已删除':'删除失败：'+d.error);await load()}async function saveSettings(){let body={panel_user:panel_user.value,proxy_user:proxy_user.value,public_host:public_host.value,apply_proxy_credentials_to_existing:apply_creds.checked};if(panel_pass.value)body.panel_pass=panel_pass.value;if(proxy_pass.value)body.proxy_pass=proxy_pass.value;let d=await api('/api/config',{method:'POST',body:JSON.stringify(body)});msg(d.ok?'设置已保存':'保存失败：'+d.error);panel_pass.value='';proxy_pass.value='';await load()}async function saveOci(){let body={user:oci_user.value,fingerprint:oci_fingerprint.value,tenancy:oci_tenancy.value,region:oci_region.value,private_key:oci_key.value,vnic_id:oci_vnic.value,subnet_id:oci_subnet.value};let d=await api('/api/oci_config',{method:'POST',body:JSON.stringify(body)});msg(d.ok?(d.validated?'OCI 已保存并验证，通过 IPv6 数：'+d.ipv6_count:'OCI 已保存但验证警告：'+d.warning):'保存失败：'+d.error);oci_key.value='';await load()}load();setInterval(load,15000)</script></body></html>
